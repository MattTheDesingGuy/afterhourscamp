name: Deploy to GitHub Pages

# Builds the Vite site and publishes the dist/ folder to GitHub Pages.
# One-time setup: Settings → Pages → Build and deployment → Source: GitHub Actions.
#
# VITE_BASE_PATH controls the URL prefix the site is served from. Change it here
# when switching between project page and custom domain:
#   - Project page (username.github.io/afterhourscamp/) → "/afterhourscamp/"
#   - Custom domain (afterhourscamp.com.au) or root user/org page → "/"
# When changing this, also update pathSegmentsToKeep in public/404.html
# (1 for project page, 0 for root/custom domain).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_BASE_PATH: /afterhourscamp/
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
