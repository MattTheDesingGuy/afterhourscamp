<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Afterhours</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages — MIT License
      // https://github.com/rafgraph/spa-github-pages
      // pathSegmentsToKeep:
      //   1 = project page (e.g. username.github.io/afterhourscamp/) — KEEP this for the project page deploy
      //   0 = root user/org page or custom domain (afterhourscamp.com.au) — switch to 0 then
      var pathSegmentsToKeep = 1;

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
